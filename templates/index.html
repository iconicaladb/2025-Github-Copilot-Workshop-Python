<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            Pomodoro Timer
            <button id="settings-btn" class="btn-settings">⚙️</button>
        </div>
        <div class="timer-section">
            <div>In Progress</div>
            <svg width="180" height="180">
                <circle cx="90" cy="90" r="80" stroke="#e5e5ef" stroke-width="16" fill="none" />
                <circle id="progress-circle" cx="90" cy="90" r="80" stroke="#7b6ef6" stroke-width="16" fill="none" stroke-linecap="round" />
            </svg>
            <div id="timer">25:00</div>
        </div>
        <div class="button-row">
            <button id="start-btn" class="btn btn-start">Start</button>
            <button id="reset-btn" class="btn btn-reset">Reset</button>
        </div>
        <div class="progress-section">
            <div>
                <div class="progress-label">Today's Progress</div>
                <div class="progress-value" id="sessions-completed">4 Completed</div>
            </div>
            <div>
                <div class="progress-label">Focus Time</div>
                <div class="progress-value" id="focus-time">1h 40m</div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button id="close-settings" class="btn-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label>Focus Time</label>
                    <div class="time-options">
                        <button class="time-btn" data-time="15">15m</button>
                        <button class="time-btn active" data-time="25">25m</button>
                        <button class="time-btn" data-time="35">35m</button>
                        <button class="time-btn" data-time="45">45m</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Break Time</label>
                    <div class="time-options">
                        <button class="break-btn active" data-time="5">5m</button>
                        <button class="break-btn" data-time="10">10m</button>
                        <button class="break-btn" data-time="15">15m</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Theme</label>
                    <div class="theme-options">
                        <button class="theme-btn" data-theme="light">Light</button>
                        <button class="theme-btn active" data-theme="dark">Dark</button>
                        <button class="theme-btn" data-theme="focus">Focus</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Sound Settings</label>
                    <div class="sound-options">
                        <div class="sound-toggle">
                            <input type="checkbox" id="start-sound" checked>
                            <label for="start-sound">Start Sound</label>
                        </div>
                        <div class="sound-toggle">
                            <input type="checkbox" id="end-sound" checked>
                            <label for="end-sound">End Sound</label>
                        </div>
                        <div class="sound-toggle">
                            <input type="checkbox" id="tick-sound">
                            <label for="tick-sound">Tick Sound</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/timer.js"></script>
</body>
</html>
